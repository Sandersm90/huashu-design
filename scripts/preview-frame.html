<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Huashu Preview</title>
  <style>
    :root {
      --bg: #111111;
      --panel: #171717;
      --panel-2: #1f1f1f;
      --border: rgba(255,255,255,0.08);
      --text: #f3f3f0;
      --muted: rgba(243,243,240,0.68);
      --accent: #d97757;
      --accent-2: #efc4b4;
      --success: #8fb996;
      --selected-bg: rgba(217,119,87,0.12);
      --selected-border: rgba(217,119,87,0.85);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(217,119,87,0.13), transparent 32%),
        linear-gradient(180deg, #121212 0%, #0b0b0b 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
    }

    .header, .footer {
      flex-shrink: 0;
      border-color: var(--border);
      background: rgba(17,17,17,0.92);
      backdrop-filter: blur(14px);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      min-width: 0;
    }

    .brand-mark {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 22px rgba(217,119,87,0.35);
      flex-shrink: 0;
    }

    .brand-copy { min-width: 0; }
    .brand-copy h1 {
      font-size: 0.95rem;
      margin: 0;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .brand-copy p {
      margin: 0.15rem 0 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .status::before {
      content: "";
      width: 0.45rem;
      height: 0.45rem;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 12px rgba(143,185,150,0.65);
    }

    .main {
      flex: 1;
      overflow: auto;
    }

    .content {
      width: min(1200px, calc(100vw - 2rem));
      margin: 0 auto;
      padding: 1.5rem 0 2rem;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding: 0.8rem 1.25rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* Generic content helpers */
    h2, h3, h4 { margin-top: 0; }
    h2 { font-size: 1.6rem; margin-bottom: 0.4rem; }
    h3 { font-size: 1.1rem; margin-bottom: 0.3rem; }
    p { color: var(--muted); line-height: 1.55; }
    .subtitle { color: var(--muted); margin-top: 0; margin-bottom: 1.25rem; }
    .section { margin-bottom: 1.5rem; }

    .options, .cards {
      display: grid;
      gap: 1rem;
    }

    .cards {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .option, .card, [data-choice] {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      border-radius: 18px;
      transition: border-color 120ms ease, transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    .option, .card {
      overflow: hidden;
      cursor: pointer;
    }

    .option:hover, .card:hover, [data-choice]:hover {
      border-color: rgba(217,119,87,0.45);
      transform: translateY(-1px);
    }

    .option.selected, .card.selected, [data-choice].selected, [data-choice][aria-pressed="true"] {
      border-color: var(--selected-border);
      background: var(--selected-bg);
      box-shadow: 0 0 0 1px rgba(217,119,87,0.2) inset;
    }

    .option {
      display: flex;
      gap: 1rem;
      padding: 1rem 1.1rem;
      align-items: flex-start;
    }

    .letter {
      flex-shrink: 0;
      width: 1.9rem;
      height: 1.9rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.82rem;
    }

    .selected .letter, [aria-pressed="true"] .letter {
      background: linear-gradient(135deg, var(--accent), #c95d38);
    }

    .card-image, .mockup, .placeholder {
      background: var(--panel-2);
    }

    .card-image {
      aspect-ratio: 16 / 10;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .card-body {
      padding: 1rem;
    }

    .mockup {
      border-radius: 18px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .mockup-header {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      background: rgba(255,255,255,0.02);
    }

    .mockup-body {
      padding: 1rem;
    }

    .split {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1rem;
    }

    .placeholder {
      border: 1px dashed rgba(255,255,255,0.16);
      border-radius: 18px;
      color: var(--muted);
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1rem;
    }

    a { color: inherit; }
  </style>
</head>
<body>
  <header class="header">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-copy">
        <h1>Huashu Preview</h1>
        <p>Browser-side review surface for live design directions, prototypes, and tweaks.</p>
      </div>
    </div>
    <div class="status">Connected</div>
  </header>

  <main class="main">
    <div class="content" id="huashu-preview-content"><!-- CONTENT --></div>
  </main>

  <footer class="footer">
    <span id="huashu-preview-indicator">Click a choice in the preview, then continue in the terminal.</span>
  </footer>
</body>
</html>
